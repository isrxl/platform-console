name: terraform-plan-dashboard

on:
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-plan-dashboard.yml"
      - ".github/scripts/parse-plan.sh"
      - ".github/scripts/write-dashboard-fragment.sh"
      - ".github/scripts/build-combined-comment.sh"

permissions:
  contents: read
  pull-requests: write # post/update PR comment
  id-token: write # OIDC federation to Entra ID

env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform-plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, test, prod]
        include:
          - environment: dev
            state_key: dev/terraform.tfstate
            tfvars_file: dev.tfvars
          - environment: test
            state_key: test/terraform.tfstate
            tfvars_file: test.tfvars
          - environment: prod
            state_key: prod/terraform.tfstate
            tfvars_file: prod.tfvars
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_SA }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ matrix.state_key }}" \
            -backend-config="use_azuread_auth=true" \
            -reconfigure

      - name: Terraform Plan
        id: plan
        shell: bash
        run: |
          set +e
          terraform plan \
            -var-file="${{ matrix.tfvars_file }}" \
            -out=tfplan \
            -detailed-exitcode \
            -no-color 2>&1 | tee plan-output.txt
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >>"$GITHUB_OUTPUT"
          if [ -f tfplan ]; then
            terraform show -json tfplan >tfplan.json
          fi
          exit 0
        continue-on-error: true

      - name: Parse Plan
        id: parse
        run: bash .github/scripts/parse-plan.sh

      - name: Write dashboard fragment
        run: bash .github/scripts/write-dashboard-fragment.sh
        env:
          ENVIRONMENT: ${{ matrix.environment }}
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
          ADDS: ${{ steps.parse.outputs.adds }}
          CHANGES: ${{ steps.parse.outputs.changes }}
          DESTROYS: ${{ steps.parse.outputs.destroys }}
          REPLACES: ${{ steps.parse.outputs.replaces }}
          NO_OPS: ${{ steps.parse.outputs.no_ops }}
          TOTAL: ${{ steps.parse.outputs.total }}
          RISK: ${{ steps.parse.outputs.risk }}
          FLAG_IAM: ${{ steps.parse.outputs.flag_iam }}
          FLAG_NETWORK: ${{ steps.parse.outputs.flag_network }}
          FLAG_DATA: ${{ steps.parse.outputs.flag_data }}
          FLAG_DESTROY: ${{ steps.parse.outputs.flag_destroy }}
          FLAG_REPLACE: ${{ steps.parse.outputs.flag_replace }}
          ADDS_LIST: ${{ steps.parse.outputs.adds_list }}
          CHANGES_LIST: ${{ steps.parse.outputs.changes_list }}
          DESTROYS_LIST: ${{ steps.parse.outputs.destroys_list }}
          REPLACES_LIST: ${{ steps.parse.outputs.replaces_list }}

      - name: Upload dashboard fragment
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-fragment-${{ matrix.environment }}
          path: dashboard-${{ matrix.environment }}.json
          retention-days: 1
          if-no-files-found: error

      - name: Upload Plan Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfplan-${{ matrix.environment }}-${{ github.sha }}
          path: |
            tfplan
            tfplan.json
            plan-output.txt
          retention-days: 30
          if-no-files-found: warn

  post-dashboard:
    name: Post plan dashboard
    needs: terraform-plan
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: dashboard-fragment-*
          merge-multiple: true
          path: dashboard-fragments

      - name: Build combined comment
        run: bash .github/scripts/build-combined-comment.sh dashboard-fragments
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- terraform-plan-dashboard -->';
            const legacyMarkers = ['DEV', 'TEST', 'PROD'].map(
              (e) => `<!-- terraform-plan-dashboard-${e} -->`,
            );
            const body = require('fs').readFileSync('comment-body.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            // Remove legacy per-env comments from the previous layout.
            for (const c of comments) {
              if (legacyMarkers.some((m) => c.body && c.body.includes(m))) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
