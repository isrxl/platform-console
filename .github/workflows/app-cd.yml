name: app-cd

# NOTE ON PRIVATE NETWORKING:
# The App Service has its public endpoint disabled — it is reachable only from
# inside the VNet, so a GitHub-hosted runner cannot reach its HTTP/SCM endpoints
# by default. To deploy from a hosted runner, each deploy job opens a TEMPORARY
# access window: it enables public access and adds an Allow rule for ONLY the
# runner's egress IP (an implicit Deny-all covers everyone else), then ALWAYS
# re-locks to the captured original state in a cleanup step — even on failure.
# A subsequent `terraform apply` also reconciles. (dev/test carry the same window
# but are gated off until their infra is provisioned.) A self-hosted, VNet-
# integrated runner would remove the need for this window altogether.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app-cd.yml"
  schedule:
    - cron: "0 22 * * 0" # 8am AEST every Sunday
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (respects DEPLOY_* toggles below)"
        required: false
        type: choice
        options: [all, dev, test, prod]
        default: "all"

permissions:
  id-token: write # required to request the GitHub OIDC token
  contents: read

# Environment toggles MUST match infra-cd — an app can only be deployed to an
# environment whose infrastructure has actually been provisioned. Each job runs
# as a no-op shell when its toggle is false, so the needs-chain stays intact and
# enabled environments still deploy in order.
env:
  DEPLOY_DEV: "false"
  DEPLOY_TEST: "false"
  DEPLOY_PROD: "true"

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    env:
      APP_NAME: app-cdvlplatcon-webapp-dev-aue
      RG: rg-cdvlplatcon-webapp-dev-aue
      ENV: dev
      RUN_JOB: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.environment == 'all' || github.event.inputs.environment == 'dev' }}
    steps:
      - if: ${{ env.DEPLOY_DEV == 'true' && env.RUN_JOB == 'true' }}
        uses: actions/checkout@v4
      - if: ${{ env.DEPLOY_DEV == 'true' && env.RUN_JOB == 'true' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - if: ${{ env.DEPLOY_DEV == 'true' && env.RUN_JOB == 'true' }}
        name: Package app
        run: |
          python -m pip install --upgrade pip
          cd app
          pip install -r requirements.txt --target ".python_packages/lib/site-packages" --upgrade
          zip -r ../app.zip . -x "tests/*" "*.pyc" "__pycache__/*"
      - if: ${{ env.DEPLOY_DEV == 'true' && env.RUN_JOB == 'true' }}
        name: Detect runner egress IP
        id: ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"
      - if: ${{ env.DEPLOY_DEV == 'true' && env.RUN_JOB == 'true' }}
        name: Open temporary access window (runner IP only)
        id: window
        run: |
          PNA=$(az webapp show -g "$RG" -n "$APP_NAME" --query publicNetworkAccess -o tsv)
          echo "pna=${PNA:-Disabled}" >> "$GITHUB_OUTPUT"
          bash .github/scripts/app-deploy-window.sh open "$RG" "$APP_NAME" "${{ steps.ip.outputs.ip }}"
          az webapp config appsettings set -g "$RG" -n "$APP_NAME" --settings \
            SCM_DO_BUILD_DURING_DEPLOYMENT=false -o none
          bash .github/scripts/wait-for-scm.sh "$APP_NAME"
      - if: ${{ env.DEPLOY_DEV == 'true' && env.RUN_JOB == 'true' }}
        name: Deploy
        run: bash .github/scripts/deploy-webapp.sh "$RG" "$APP_NAME" app.zip
      - if: ${{ env.DEPLOY_DEV == 'true' && env.RUN_JOB == 'true' }}
        name: Inject version app settings
        run: |
          az webapp config appsettings set -g "$RG" -n "$APP_NAME" --settings \
            APP_VERSION="${{ github.sha }}" \
            SEMANTIC_VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo '')" \
            DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      - if: ${{ env.DEPLOY_DEV == 'true' && env.RUN_JOB == 'true' }}
        name: Smoke test /health
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "https://${APP_NAME}.azurewebsites.net/health"; then exit 0; fi
            sleep 30
          done
          echo "Health check failed" && exit 1
      - if: ${{ env.DEPLOY_DEV == 'true' && env.RUN_JOB == 'true' }}
        name: Record deployment
        run: |
          curl -fsS -X POST "https://${APP_NAME}.azurewebsites.net/api/deployments" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"$ENV\",\"version\":\"${{ github.sha }}\",\"deployed_by\":\"pipeline\"}"
      - if: ${{ env.DEPLOY_DEV == 'true' && env.RUN_JOB == 'true' && always() }}
        name: Close access window (restore private-only)
        run: bash .github/scripts/app-deploy-window.sh close "$RG" "$APP_NAME" "${{ steps.window.outputs.pna }}"

  deploy-test:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: test
    env:
      APP_NAME: app-cdvlplatcon-webapp-test-aue
      RG: rg-cdvlplatcon-webapp-test-aue
      ENV: test
      RUN_JOB: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.environment == 'all' || github.event.inputs.environment == 'test' }}
    steps:
      - if: ${{ env.DEPLOY_TEST == 'true' && env.RUN_JOB == 'true' }}
        uses: actions/checkout@v4
      - if: ${{ env.DEPLOY_TEST == 'true' && env.RUN_JOB == 'true' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - if: ${{ env.DEPLOY_TEST == 'true' && env.RUN_JOB == 'true' }}
        name: Package app
        run: |
          python -m pip install --upgrade pip
          cd app
          pip install -r requirements.txt --target ".python_packages/lib/site-packages" --upgrade
          zip -r ../app.zip . -x "tests/*" "*.pyc" "__pycache__/*"
      - if: ${{ env.DEPLOY_TEST == 'true' && env.RUN_JOB == 'true' }}
        name: Detect runner egress IP
        id: ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"
      - if: ${{ env.DEPLOY_TEST == 'true' && env.RUN_JOB == 'true' }}
        name: Open temporary access window (runner IP only)
        id: window
        run: |
          PNA=$(az webapp show -g "$RG" -n "$APP_NAME" --query publicNetworkAccess -o tsv)
          echo "pna=${PNA:-Disabled}" >> "$GITHUB_OUTPUT"
          bash .github/scripts/app-deploy-window.sh open "$RG" "$APP_NAME" "${{ steps.ip.outputs.ip }}"
          az webapp config appsettings set -g "$RG" -n "$APP_NAME" --settings \
            SCM_DO_BUILD_DURING_DEPLOYMENT=false -o none
          bash .github/scripts/wait-for-scm.sh "$APP_NAME"
      - if: ${{ env.DEPLOY_TEST == 'true' && env.RUN_JOB == 'true' }}
        name: Deploy
        run: bash .github/scripts/deploy-webapp.sh "$RG" "$APP_NAME" app.zip
      - if: ${{ env.DEPLOY_TEST == 'true' && env.RUN_JOB == 'true' }}
        name: Inject version app settings
        run: |
          az webapp config appsettings set -g "$RG" -n "$APP_NAME" --settings \
            APP_VERSION="${{ github.sha }}" \
            SEMANTIC_VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo '')" \
            DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      - if: ${{ env.DEPLOY_TEST == 'true' && env.RUN_JOB == 'true' }}
        name: Smoke + integration test
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "https://${APP_NAME}.azurewebsites.net/health"; then break; fi
            sleep 30
          done
          curl -fsS "https://${APP_NAME}.azurewebsites.net/api/health"
          curl -fsS "https://${APP_NAME}.azurewebsites.net/api/flags"
      - if: ${{ env.DEPLOY_TEST == 'true' && env.RUN_JOB == 'true' }}
        name: Record deployment
        run: |
          curl -fsS -X POST "https://${APP_NAME}.azurewebsites.net/api/deployments" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"$ENV\",\"version\":\"${{ github.sha }}\",\"deployed_by\":\"pipeline\"}"
      - if: ${{ env.DEPLOY_TEST == 'true' && env.RUN_JOB == 'true' && always() }}
        name: Close access window (restore private-only)
        run: bash .github/scripts/app-deploy-window.sh close "$RG" "$APP_NAME" "${{ steps.window.outputs.pna }}"

  deploy-prod:
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: prod
    env:
      APP_NAME: app-cdvlplatcon-webapp-prod-aue
      RG: rg-cdvlplatcon-webapp-prod-aue
      SLOT: staging
      ENV: prod
      RUN_JOB: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.environment == 'all' || github.event.inputs.environment == 'prod' }}
    steps:
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' }}
        uses: actions/checkout@v4
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' }}
        name: Package app
        run: |
          python -m pip install --upgrade pip
          cd app
          pip install -r requirements.txt --target ".python_packages/lib/site-packages" --upgrade
          zip -r ../app.zip . -x "tests/*" "*.pyc" "__pycache__/*"
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' }}
        name: Detect runner egress IP
        id: ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' }}
        name: Open temporary access window (runner IP only)
        id: window
        run: |
          SLOT_PNA=$(az webapp show -g "$RG" -n "$APP_NAME" --slot "$SLOT" --query publicNetworkAccess -o tsv)
          PROD_PNA=$(az webapp show -g "$RG" -n "$APP_NAME" --query publicNetworkAccess -o tsv)
          echo "slot_pna=${SLOT_PNA:-Disabled}" >> "$GITHUB_OUTPUT"
          echo "prod_pna=${PROD_PNA:-Disabled}" >> "$GITHUB_OUTPUT"
          bash .github/scripts/app-deploy-window.sh open "$RG" "$APP_NAME" "${{ steps.ip.outputs.ip }}" "$SLOT"
          az webapp config appsettings set -g "$RG" -n "$APP_NAME" --slot "$SLOT" --settings \
            SCM_DO_BUILD_DURING_DEPLOYMENT=false -o none
          bash .github/scripts/wait-for-scm.sh "$APP_NAME" "$SLOT"
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' }}
        name: Deploy to staging slot
        run: bash .github/scripts/deploy-webapp.sh "$RG" "$APP_NAME" app.zip "$SLOT"
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' }}
        name: Inject version app settings (staging slot)
        run: |
          az webapp config appsettings set -g "$RG" -n "$APP_NAME" --slot "$SLOT" --settings \
            APP_VERSION="${{ github.sha }}" \
            SEMANTIC_VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo '')" \
            DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' }}
        name: Smoke test staging slot
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "https://${APP_NAME}-${SLOT}.azurewebsites.net/health"; then exit 0; fi
            sleep 30
          done
          echo "Staging smoke test failed — aborting before swap" && exit 1
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' }}
        name: Swap staging into production
        run: az webapp deployment slot swap -g "$RG" -n "$APP_NAME" --slot "$SLOT" --target-slot production
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' }}
        name: Post-swap health check (5 min, 10 x 30s)
        id: postswap
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "https://${APP_NAME}.azurewebsites.net/health"; then
              echo "ok" && exit 0
            fi
            sleep 30
          done
          echo "failed=true" >> "$GITHUB_OUTPUT"
          exit 1
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' && failure() && steps.postswap.outputs.failed == 'true' }}
        name: Rollback on post-swap failure
        run: az webapp deployment slot swap -g "$RG" -n "$APP_NAME" --slot "$SLOT" --target-slot production
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' && success() }}
        name: Record deployment
        run: |
          curl -fsS -X POST "https://${APP_NAME}.azurewebsites.net/api/deployments" \
            -H "Content-Type: application/json" \
            -d "{\"environment\":\"$ENV\",\"version\":\"${{ github.sha }}\",\"deployed_by\":\"pipeline\"}"
      - if: ${{ env.DEPLOY_PROD == 'true' && env.RUN_JOB == 'true' && always() }}
        name: Close access window (restore private-only)
        run: |
          bash .github/scripts/app-deploy-window.sh close "$RG" "$APP_NAME" \
            "${{ steps.window.outputs.prod_pna }}" "$SLOT" "${{ steps.window.outputs.slot_pna }}"
