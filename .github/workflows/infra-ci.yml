name: infra-ci

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/infra-ci.yml"

permissions:
  id-token: write # required to request the GitHub OIDC token
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.5"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  validate:
    name: Validate, scan, and plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false

      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Plan all environments
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          OUT=""
          for ENV in dev test prod; do
            echo "::group::plan $ENV"
            terraform init -reconfigure \
              -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
              -backend-config="storage_account_name=${{ secrets.TF_STATE_SA }}" \
              -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
              -backend-config="key=${ENV}/terraform.tfstate"
            terraform plan -input=false -var-file="${ENV}.tfvars" -no-color | tee "plan-${ENV}.txt"
            echo "::endgroup::"
          done

      - name: Post plans as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Terraform plan summary\n';
            for (const env of ['dev','test','prod']) {
              const file = `plan-${env}.txt`;
              let txt = fs.existsSync(file) ? fs.readFileSync(file,'utf8') : 'plan did not run';
              if (txt.length > 60000) txt = txt.slice(0, 60000) + '\n... truncated ...';
              body += `\n<details><summary>${env}</summary>\n\n\`\`\`\n${txt}\n\`\`\`\n</details>\n`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body
            });
