name: infra-ci

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/infra-ci.yml"

permissions:
  id-token: write # required to request the GitHub OIDC token
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.5"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  validate:
    name: Validate, scan, and plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false

      # Skipped checks are deliberate trade-offs for this single-region, cost-
      # constrained lab (documented in README "Security scanning"). They fall into:
      #   - HA/zone-redundancy/failover (cost): CKV_AZURE_212, 225, 229
      #   - Teardown-friendly KV (no purge protection): CKV_AZURE_42, 110
      #   - SQL auth by design, not Entra-only (handoff §12): CKV2_AZURE_27
      #   - SQL auditing/VA need extra storage, out of lab scope: CKV_AZURE_23, 24, CKV2_AZURE_2
      #   - Ephemeral jump VM: CKV_AZURE_50, 151
      #   - Not applicable to a private, code-deployed app: CKV_AZURE_13, 17, 88, 224
      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: CKV_AZURE_212,CKV_AZURE_225,CKV_AZURE_229,CKV_AZURE_42,CKV_AZURE_110,CKV2_AZURE_27,CKV_AZURE_23,CKV_AZURE_24,CKV2_AZURE_2,CKV_AZURE_50,CKV_AZURE_151,CKV_AZURE_13,CKV_AZURE_17,CKV_AZURE_88,CKV_AZURE_224

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Plan all environments
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          for ENV in dev test prod; do
            echo "::group::plan $ENV"
            terraform init -reconfigure \
              -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
              -backend-config="storage_account_name=${{ secrets.TF_STATE_SA }}" \
              -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
              -backend-config="key=${ENV}/terraform.tfstate"
            terraform plan -input=false -var-file="${ENV}.tfvars" -no-color -out="tfplan-${ENV}"
            # Human-readable plan (for the collapsed "full plan" block)...
            terraform show -no-color "tfplan-${ENV}" > "plan-${ENV}.txt"
            # ...and the machine-readable form we summarise from.
            terraform show -json "tfplan-${ENV}" > "plan-${ENV}.json"
            echo "::endgroup::"
          done

      - name: Post/update plan summary comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- tf-plan-summary -->';
            const envs = ['dev', 'test', 'prod'];
            const symbol = (actions) => {
              const s = new Set(actions);
              if (s.has('create') && s.has('delete')) return '±'; // replace
              if (s.has('create')) return '+';
              if (s.has('update')) return '~';
              if (s.has('delete')) return '-';
              return '';
            };
            let table = '| Env | Add | Change | Destroy |\n|---|---:|---:|---:|\n';
            let sections = '';
            for (const env of envs) {
              const jf = `plan-${env}.json`;
              if (!fs.existsSync(jf)) {
                table += `| **${env}** | — | — | ⚠️ plan failed |\n`;
                continue;
              }
              const plan = JSON.parse(fs.readFileSync(jf, 'utf8'));
              const changes = (plan.resource_changes || []).filter((r) => {
                const a = r.change.actions;
                return !(a.length === 1 && (a[0] === 'no-op' || a[0] === 'read'));
              });
              let add = 0, chg = 0, del = 0;
              const lines = [];
              for (const r of changes) {
                const sym = symbol(r.change.actions);
                if (sym === '+') add++;
                else if (sym === '~') chg++;
                else if (sym === '-') del++;
                else if (sym === '±') { add++; del++; }
                lines.push(`${sym} ${r.address}`);
              }
              table += `| **${env}** | ${add} | ${chg} | ${del} |\n`;
              const list = lines.length ? lines.sort().join('\n') : 'No changes. Infrastructure matches configuration.';
              let full = fs.existsSync(`plan-${env}.txt`) ? fs.readFileSync(`plan-${env}.txt`, 'utf8') : '';
              if (full.length > 50000) full = full.slice(0, 50000) + '\n... truncated — see workflow logs ...';
              sections +=
                `\n<details><summary><b>${env}</b> — ${add} to add, ${chg} to change, ${del} to destroy</summary>\n\n` +
                '```text\n' + list + '\n```\n' +
                '<details><summary>full plan</summary>\n\n```text\n' + full + '\n```\n</details>\n</details>\n';
            }
            const body = `${MARKER}\n## Terraform plan summary\n\n_Plan-only preview. The merge to \`main\` re-plans and applies (see infra-cd)._\n\n${table}\n${sections}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }
