name: tf-apply
description: Init, plan, and apply Terraform for a single environment (OIDC auth).

inputs:
  environment:
    description: Environment name (dev / test / prod)
    required: true
  client_id:
    description: Azure AD application (client) ID for OIDC login
    required: true
  tenant_id:
    description: Azure AD tenant ID
    required: true
  subscription_id:
    description: Azure subscription ID
    required: true
  tf_state_rg:
    required: true
  tf_state_sa:
    required: true
  tf_state_container:
    required: true
  tf_version:
    required: false
    default: "1.9.5"

runs:
  using: composite
  steps:
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.tf_version }}

    - name: Azure login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.client_id }}
        tenant-id: ${{ inputs.tenant_id }}
        subscription-id: ${{ inputs.subscription_id }}

    - name: Detect runner egress IP
      id: ip
      shell: bash
      run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"

    - name: Terraform init
      shell: bash
      env:
        ARM_USE_OIDC: "true"
        ARM_CLIENT_ID: ${{ inputs.client_id }}
        ARM_TENANT_ID: ${{ inputs.tenant_id }}
        ARM_SUBSCRIPTION_ID: ${{ inputs.subscription_id }}
      run: |
        terraform init -reconfigure \
          -backend-config="resource_group_name=${{ inputs.tf_state_rg }}" \
          -backend-config="storage_account_name=${{ inputs.tf_state_sa }}" \
          -backend-config="container_name=${{ inputs.tf_state_container }}" \
          -backend-config="key=${{ inputs.environment }}/terraform.tfstate"

    # Existing vaults deny the runner by default. Refresh reads secrets over the
    # public endpoint during plan/apply — allow this run's IP first, remove after.
    - name: Allow runner through Key Vault firewall
      id: kv_access
      shell: bash
      run: |
        KV="kv-cdvlplatcon-${{ inputs.environment }}-aue"
        RG="rg-cdvlplatcon-webapp-${{ inputs.environment }}-aue"
        if az keyvault show -g "$RG" -n "$KV" >/dev/null 2>&1; then
          az keyvault network-rule add -g "$RG" --name "$KV" \
            --ip-address "${{ steps.ip.outputs.ip }}" -o none
          echo "opened=true" >> "$GITHUB_OUTPUT"
          echo "kv=$KV" >> "$GITHUB_OUTPUT"
          echo "rg=$RG" >> "$GITHUB_OUTPUT"
          sleep 30
        fi

    - name: Terraform plan
      shell: bash
      env:
        ARM_USE_OIDC: "true"
        ARM_CLIENT_ID: ${{ inputs.client_id }}
        ARM_TENANT_ID: ${{ inputs.tenant_id }}
        ARM_SUBSCRIPTION_ID: ${{ inputs.subscription_id }}
      run: |
        terraform plan -input=false \
          -var-file="${{ inputs.environment }}.tfvars" \
          -var="deployer_ip=${{ steps.ip.outputs.ip }}" \
          -out=tfplan

    - name: Terraform apply
      shell: bash
      env:
        ARM_USE_OIDC: "true"
        ARM_CLIENT_ID: ${{ inputs.client_id }}
        ARM_TENANT_ID: ${{ inputs.tenant_id }}
        ARM_SUBSCRIPTION_ID: ${{ inputs.subscription_id }}
      run: terraform apply -input=false -auto-approve tfplan

    - name: Close Key Vault firewall rule (temporary)
      if: always() && steps.kv_access.outputs.opened == 'true'
      shell: bash
      run: |
        az keyvault network-rule remove \
          -g "${{ steps.kv_access.outputs.rg }}" \
          --name "${{ steps.kv_access.outputs.kv }}" \
          --ip-address "${{ steps.ip.outputs.ip }}" -o none || true
